<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Changelog — Assertin Forge</title>
  <meta name="description" content="Riwayat update dan release Assertin Forge — fitur baru, perbaikan, dan peningkatan." />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" href="https://assertin.com/changelog" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="icon" href="/favicon-32.png" type="image/png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-400: #60a5fa;
      --blue-500: #3b82f6;
      --blue-600: #2563eb;
      --cyan-400: #22d3ee;
      --green-400: #4ade80;
      --yellow-400: #facc15;
      --red-400:  #f87171;
      --slate-300: #cbd5e1;
      --slate-400: #94a3b8;
      --slate-500: #64748b;
      --slate-600: #475569;
      --slate-700: #334155;
      --slate-800: #1e293b;
      --slate-900: #0f172a;
      --slate-950: #080e1a;
    }

    html { scroll-behavior: smooth; overflow-x: hidden; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--slate-950);
      color: var(--slate-400);
      line-height: 1.7;
      overflow-x: hidden;
    }

    a { text-decoration: none; color: inherit; }

    .wrap { max-width: 1080px; margin: 0 auto; padding: 0 28px; }
    .wrap-md { max-width: 720px; margin: 0 auto; padding: 0 28px; }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 99;
      background: rgba(8,14,26,.82);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255,255,255,.045);
      padding: 15px 0;
    }
    .nav-inner { display: flex; align-items: center; justify-content: space-between; gap: 24px; }
    .logo { display: flex; align-items: center; gap: 9px; }
    .logo img { width: 28px; height: 28px; object-fit: contain; }
    .logo-name { font-size: 16.5px; font-weight: 700; color: white; letter-spacing: -.4px; }
    .logo-name span { color: var(--blue-400); }
    .nav-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 16px; background: var(--blue-600); color: white;
      border-radius: 7px; font-size: 13px; font-weight: 500;
      transition: background .18s, transform .15s;
    }
    .nav-btn:hover { background: var(--blue-500); transform: translateY(-1px); }

    /* PAGE HEADER */
    .page-header { padding: 56px 0 40px; }
    .breadcrumb { font-size: 12.5px; color: var(--slate-600); margin-bottom: 18px; }
    .breadcrumb a { color: var(--slate-500); }
    .breadcrumb a:hover { color: var(--blue-400); }
    .eyebrow {
      display: block; font-size: 11px; font-weight: 600;
      letter-spacing: 1.4px; text-transform: uppercase;
      color: var(--blue-400); margin-bottom: 12px;
    }
    .page-header h1 {
      font-size: clamp(28px, 4vw, 42px); font-weight: 800;
      color: white; letter-spacing: -1px; line-height: 1.18; margin-bottom: 12px;
    }
    .lead { font-size: 15px; color: var(--slate-500); max-width: 520px; }

    /* TIMELINE */
    .timeline { padding-bottom: 80px; }

    .release {
      position: relative;
      padding-left: 32px;
      padding-bottom: 48px;
    }
    .release::before {
      content: '';
      position: absolute; left: 8px; top: 14px; bottom: 0;
      width: 1px; background: var(--slate-800);
    }
    .release:last-child::before { display: none; }
    .release::after {
      content: '';
      position: absolute; left: 3px; top: 10px;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--slate-900); border: 2px solid var(--slate-700);
    }
    .release:first-child::after {
      background: var(--blue-600); border-color: var(--blue-400);
      box-shadow: 0 0 0 4px rgba(96,165,250,.12);
    }

    .release-meta {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      margin-bottom: 2px;
    }
    .release-version { font-size: 16px; font-weight: 800; color: white; letter-spacing: -.4px; }
    .release-date { font-size: 12px; color: var(--slate-600); }
    .badge-latest {
      font-size: 9px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase;
      background: rgba(96,165,250,.1); color: var(--blue-400);
      border: 1px solid rgba(96,165,250,.25); border-radius: 4px;
      padding: 2px 7px;
    }

    .release-highlights {
      font-size: 14px; color: var(--slate-300); font-weight: 600;
      margin-bottom: 14px; letter-spacing: -.1px;
    }

    .items { display: flex; flex-direction: column; gap: 8px; }

    .item {
      display: flex; align-items: baseline; gap: 8px;
      font-size: 13.5px; color: var(--slate-500); line-height: 1.6;
    }

    .badge {
      flex-shrink: 0;
      font-size: 9px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
      padding: 2px 6px; border-radius: 4px; border: 1px solid;
    }
    .badge-new      { color: var(--blue-400);  background: rgba(96,165,250,.08);  border-color: rgba(96,165,250,.2); }
    .badge-improved { color: var(--cyan-400);  background: rgba(34,211,238,.08);  border-color: rgba(34,211,238,.2); }
    .badge-fixed    { color: var(--green-400); background: rgba(74,222,128,.08);  border-color: rgba(74,222,128,.2); }
    .badge-removed  { color: var(--red-400);   background: rgba(248,113,113,.08); border-color: rgba(248,113,113,.2); }

    /* DIVIDER */
    .release-divider {
      height: 1px; background: var(--slate-800);
      margin-bottom: 48px; display: none;
    }

    /* FOOTER */
    footer {
      border-top: 1px solid rgba(255,255,255,.05);
      padding: 28px 0;
    }
    .foot-inner {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px;
    }
    .foot-l { display: flex; align-items: center; gap: 12px; }
    .foot-logo { display: flex; align-items: center; gap: 8px; }
    .foot-logo img { width: 20px; height: 20px; object-fit: contain; }
    .foot-logo span { font-size: 14px; font-weight: 700; color: white; }
    .foot-logo span em { color: var(--blue-400); font-style: normal; }
    .foot-tag { font-size: 12px; color: var(--slate-700); }
    .foot-r { font-size: 12px; color: var(--slate-600); }
    .foot-r a { color: var(--slate-500); transition: color .2s; }
    .foot-r a:hover { color: var(--slate-300); }

    @media (max-width: 600px) {
      .page-header { padding: 40px 0 32px; }
      .release { padding-left: 24px; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="wrap">
      <div class="nav-inner">
        <a href="/" class="logo">
          <img src="/forge.png" alt="Assertin" />
          <span class="logo-name">Assertin<span>.</span></span>
        </a>
        <a href="https://forge.assertin.com" class="nav-btn">
          Buka Forge <i class="bi bi-arrow-right"></i>
        </a>
      </div>
    </div>
  </nav>

  <div class="wrap-md">
    <div class="page-header">
      <div class="breadcrumb">
        <a href="/">Assertin</a> / Changelog
      </div>
      <span class="eyebrow">Release Notes</span>
      <h1>Changelog</h1>
      <p class="lead">Semua update, fitur baru, dan perbaikan Assertin Forge — dicatat setiap rilis.</p>
    </div>

    <div class="timeline" id="timeline">
      <!-- diisi oleh script -->
    </div>
  </div>

  <footer>
    <div class="wrap">
      <div class="foot-inner">
        <div class="foot-l">
          <a href="/" class="foot-logo">
            <img src="/forge.png" alt="Assertin" />
            <span>Assertin<em>.</em></span>
          </a>
          <span class="foot-tag">Test with confidence. Ship with proof.</span>
        </div>
        <div class="foot-r">
          <a href="/">Beranda</a>&nbsp;&nbsp;·&nbsp;&nbsp;
          <span>&copy; <span id="yr"></span> Assertin.com</span>
        </div>
      </div>
    </div>
  </footer>

  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();

    const BADGE_LABEL = { new: 'New', improved: 'Improved', fixed: 'Fixed', removed: 'Removed' };

    function formatDate(str) {
      return new Date(str).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function render(data) {
      document.getElementById('timeline').innerHTML = data.map((rel, i) => `
        <div class="release">
          <div class="release-meta">
            <span class="release-version">v${rel.version}</span>
            ${i === 0 ? '<span class="badge-latest">Latest</span>' : ''}
            <span class="release-date">${formatDate(rel.date)}</span>
          </div>
          <p class="release-highlights">${rel.highlights}</p>
          <div class="items">
            ${rel.items.map(item => `
              <div class="item">
                <span class="badge badge-${item.type}">${BADGE_LABEL[item.type] || item.type}</span>
                <span>${item.text}</span>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');
    }

    // Coba fetch dari JSON (production), fallback ke data inline (local preview)
    fetch('/data/changelog.json')
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(render)
      .catch(() => render(CHANGELOG_DATA));

    // Inline fallback — sama persis dengan /data/changelog.json
    const CHANGELOG_DATA = [
      {
        version: "1.4.0",
        date: "2026-06-17",
        highlights: "Dokumentasi request & collection",
        items: [
          { type: "new",      text: "Panel dokumentasi per request — tulis catatan Markdown langsung di samping request" },
          { type: "new",      text: "Tab dokumentasi collection — overview lengkap dengan daftar semua endpoint" },
          { type: "new",      text: "Ganti avatar profil — pilih icon atau upload foto (Premium)" },
          { type: "improved", text: "Warna tema konsisten biru di seluruh halaman Runner dan Performance" },
          { type: "fixed",    text: "Halaman Supports tidak reload setiap kali dikunjungi" },
          { type: "fixed",    text: "Member workspace bisa jalankan Runner (sebelumnya error 'Collection tidak ditemukan')" }
        ]
      },
      {
        version: "1.3.0",
        date: "2026-06-10",
        highlights: "Kolaborasi workspace & undangan member",
        items: [
          { type: "new",      text: "Undang anggota ke workspace via email dengan sistem role (Owner / Editor / Viewer)" },
          { type: "new",      text: "Kelola member — lihat daftar, ubah role, atau keluarkan anggota" },
          { type: "new",      text: "Halaman penerimaan undangan dengan preview workspace sebelum bergabung" },
          { type: "improved", text: "Semua endpoint kini menggunakan akses berbasis workspace_members, bukan hanya owner" },
          { type: "fixed",    text: "Tab request sticky (pin) saat double-klik" }
        ]
      },
      {
        version: "1.2.0",
        date: "2026-06-03",
        highlights: "Performance test & k6 integration",
        items: [
          { type: "new",      text: "Mode performance test dengan k6 — simulasi hingga 50 Virtual User (Premium)" },
          { type: "new",      text: "Konfigurasi ramp-up, durasi, dan threshold p95/p99/error rate" },
          { type: "new",      text: "Grafik timeseries RPS dan latensi real-time selama tes berjalan" },
          { type: "improved", text: "Antrian job FIFO di worker — tidak ada job yang terlewat" },
          { type: "improved", text: "Wording status job lebih user-friendly, tanpa terminologi teknis internal" }
        ]
      },
      {
        version: "1.1.0",
        date: "2026-05-27",
        highlights: "Runner & skenario pengujian",
        items: [
          { type: "new",      text: "Runner — jalankan koleksi request secara berurutan atau paralel dengan iterasi" },
          { type: "new",      text: "Skenario tersimpan — buat, simpan, dan jalankan ulang skenario kapan saja" },
          { type: "new",      text: "Laporan hasil runner dengan ringkasan lulus/gagal per request" },
          { type: "improved", text: "Pre-script dan post-script per request untuk manipulasi data dinamis" }
        ]
      },
      {
        version: "1.0.0",
        date: "2026-05-20",
        highlights: "Launch pertama Assertin Forge",
        items: [
          { type: "new", text: "Request builder — method, URL, headers, body JSON/form/raw" },
          { type: "new", text: "Collection & folder untuk organisasi request" },
          { type: "new", text: "Environment variables dengan resolver {{variable}}" },
          { type: "new", text: "History request otomatis tersimpan" },
          { type: "new", text: "Export cURL dari request aktif" },
          { type: "new", text: "Assertion & ekstrak variabel dari response" }
        ]
      }
    ];
  </script>
</body>
</html>
